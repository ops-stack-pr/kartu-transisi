function svgToImage(svg) {
  return new Promise(resolve => {
    const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

/* ========================= INIT ========================= */
window.addEventListener('DOMContentLoaded', async () => {
  // Wait for Montserrat to load before rendering canvas
  try {
    await document.fonts.load('900 64px Montserrat');
    await document.fonts.load('700 24px Montserrat');
    fontReady = true;
  } catch(e) { fontReady = true; }

  gbkLogoImg = await svgToImage(GBK_LOGO_SVG);
  kemensetnegLogoImg = await svgToImage(KEMENSETNEG_LOGO_SVG);

  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'verify' && params.has('id')) {
    runValidationView(params.get('id'));
  } else {
    initGenerator();
  }
});

function initGenerator() {
  const stored = localStorage.getItem('gbk_csv');
  if (stored) parseCsvText(stored);
  else { parseCsvText(DEFAULT_CSV); localStorage.setItem('gbk_csv', DEFAULT_CSV); }

  document.getElementById('csvUpload').addEventListener('change', handleCsvUpload);
  document.getElementById('photoUpload').addEventListener('change', handlePhotoUpload);
  document.getElementById('personSelect').addEventListener('change', onPersonChange);
  document.getElementById('teamSelect').addEventListener('change', renderPreview);
  document.getElementById('titleInput').addEventListener('input', renderPreview);

  computeExpirationDate();
  document.getElementById('expDateDisplay').textContent = currentExpiration;
  renderPreview();
}

function onPersonChange() {
  updatePrivacyNote();
  renderPreview();
}

function updatePrivacyNote() {
  const sel = document.getElementById('personSelect');
  const idx = sel.value;
  let team = document.getElementById('teamSelect').value;
  if (idx !== '' && csvData[idx]) {
    team = team || csvData[idx].team;
  }
  document.getElementById('privacyNote').classList.toggle('show', PRIVACY_TEAMS.has(team));
}

/* ============== EXPIRATION (3 MONTHS) ============== */
function computeExpirationDate() {
  const d = new Date();
  d.setMonth(d.getMonth() + 3);
  currentExpirationDate = d;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  currentExpiration = `${dd}/${mm}/${d.getFullYear()}`;
}

/* ===================== CSV ===================== */
function handleCsvUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    localStorage.setItem('gbk_csv', ev.target.result);
    parseCsvText(ev.target.result);
    showStatus('CSV loaded: ' + csvData.length + ' rows', 'success');
  };
  reader.readAsText(file);
}

function parseCsvText(text) {
  let result = Papa.parse(text, { header: true, skipEmptyLines: true });
  if (result.data.length > 0 && Object.keys(result.data[0]).length < 2) {
    result = Papa.parse(text, { header: true, delimiter: '\t', skipEmptyLines: true });
  }
  csvData = result.data.map(row => {
    const norm = {};
    for (const k in row) norm[k.trim()] = (row[k]||'').toString().trim();
    return {
      no: norm['No'] || norm['NO'] || '',
      name: norm['Name'] || norm['Nama'] || '',
      unit: norm['Unit Kerja'] || '',
      team: norm['Team Classifed'] || norm['Team Classified'] || norm['Team'] || ''
    };
  }).filter(r => r.name);
  populatePersonSelect();
  document.getElementById('entryCount').textContent = csvData.length;
}

function populatePersonSelect() {
  const sel = document.getElementById('personSelect');
  sel.innerHTML = '<option value="">-- Select --</option>';
  csvData.forEach((row, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${getDisplayId(row)} - ${row.name}`;
    sel.appendChild(opt);
  });
}

/* Lookup function — match name to CSV row */
function findRowByName(name) {
  if (!name) return null;
  const target = name.trim().toLowerCase();
  return csvData.find(r => r.name.trim().toLowerCase() === target) || null;
}

function findRowById(id) {
  if (!id) return null;
  const target = id.trim().toUpperCase();
  return csvData.find(r => getDisplayId(r).toUpperCase() === target) || null;
}

/* ===================== PHOTO ===================== */
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => { photoImg = img; renderPreview(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===================== ID NUMBER ===================== */
function getDisplayId(row, teamOverride) {
  const team = teamOverride || row.team || 'Transisi Internal';
  const prefix = TEAM_PREFIX[team] || 'A';
  let no = row.no || '';
  if (/^[A-Z]/.test(no)) no = no.substring(1);
  return prefix + no;
}

function splitId(id) {
  const m = id.match(/^([A-Z])(.*)$/);
  if (m) return { prefix: m[1], number: m[2] };
  return { prefix: '', number: id };
}

/* ===================== QR ===================== */
function generateQRDataURL(payload, size=300) {
  return new Promise((resolve) => {
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    document.body.appendChild(tempDiv);
    new QRCode(tempDiv, {
      text: payload,
      width: size,
      height: size,
      correctLevel: QRCode.CorrectLevel.H
    });
    setTimeout(() => {
      const cv = tempDiv.querySelector('canvas');
      const dataUrl = cv ? cv.toDataURL() : '';
      document.body.removeChild(tempDiv);
      resolve(dataUrl);
    }, 100);
  });
}

/* ===================== HELPERS ===================== */
function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
  ctx.beginPath();
  ctx.moveTo(x + r.tl, y);
  ctx.lineTo(x + w - r.tr, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r.tr);
  ctx.lineTo(x+w, y+h-r.br);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
  ctx.lineTo(x+r.bl, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r.bl);
  ctx.lineTo(x, y+r.tl);
  ctx.quadraticCurveTo(x, y, x+r.tl, y);
  ctx.closePath();
}

function drawImageCover(ctx, img, x, y, w, h) {
  const iw = img.width, ih = img.height;
  const ir = iw/ih, dr = w/h;
  let sx=0, sy=0, sw=iw, sh=ih;
  if (ir > dr) { sw = ih * dr; sx = (iw-sw)/2; }
  else { sh = iw / dr; sy = (ih-sh)/2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function wrapCenterText(ctx, text, cx, y, maxW, lineH) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (let i=0; i<words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line.trim());
      line = words[i] + ' ';
    } else line = test;
  }
  if (line) lines.push(line.trim());
  lines.forEach((ln,i) => ctx.fillText(ln, cx, y + i*lineH));
  return lines.length;
}

function showStatus(msg, type='info') {
  const el = document.getElementById('statusMsg');
  el.className = 'status ' + type;
  el.textContent = msg;
}

/* ===================== CARD RENDERING ===================== */
async function renderCard(canvas, data, options={}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const team = data.team || 'Transisi Internal';
  const bgColor = TEAM_COLORS[team] || '#5680c1';
  const isPrivacy = PRIVACY_TEAMS.has(team);

  // Clear
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,W,H);

  // Card body
  ctx.save();
  roundRect(ctx, 0, 0, W, H, 40);
  ctx.clip();
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,W,H);

  // Vertical lines pattern
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  for (let x=0; x<W; x+=18) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  /* ===== TOP LOGO BAR ===== */
  const topBoxX = 50, topBoxY = 50, topBoxW = W - 100, topBoxH = 180;
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, topBoxX, topBoxY, topBoxW, topBoxH, 30);
  ctx.fill();

  // GBK logo (left of center)
  if (gbkLogoImg) {
    const gW = 380, gH = 140;
    const gX = topBoxX + 80;
    const gY = topBoxY + (topBoxH-gH)/2;
    ctx.drawImage(gbkLogoImg, gX, gY, gW, gH);
  }
  // Kemensetneg logo (right of center)
  if (kemensetnegLogoImg) {
    const kH = 150, kW = kH * 0.85;
    const kX = topBoxX + topBoxW - kW - 90;
    const kY = topBoxY + (topBoxH-kH)/2;
    ctx.drawImage(kemensetnegLogoImg, kX, kY, kW, kH);
  }

  /* ===== TITLE ===== */
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.font = '900 64px Montserrat, Arial Black, Arial';
  const titleText = (options.title || data.title || 'TIM PELAKSANA EKSEKUSI BLOK 15').toUpperCase();
  wrapCenterText(ctx, titleText, W/2, topBoxY + topBoxH + 80, W - 120, 72);

  /* ===== PHOTO (hidden in privacy mode) ===== */
  const photoW = 540, photoH = 600;
  const photoX = (W - photoW)/2;
  const photoY = 470;

  if (!isPrivacy) {
    // White border
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, photoX-8, photoY-8, photoW+16, photoH+16, 18);
    ctx.fill();

    // Photo content - object-
